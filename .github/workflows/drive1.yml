            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z53",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z54",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z55",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z56",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z57",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z58",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z59",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z60",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z61",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z62",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z63",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z64",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.zip"
        ]

        print(f"Starting migration of {len(urls)} files...")

        # ۳. حلقه دانلود و آپلود مستقیم بدون ذخیره دائم در دیسک گیت‌هاب
        for index, url in enumerate(urls, start=1):
            file_name = url.split('/')[-1]
            print(f"[{index}/{len(urls)}] Migrating {file_name}...")

            try:
                # دانلود استریم فایل از گیت‌هاب
                response = requests.get(url, stream=True)
                if response.status_code == 200:
                    # ذخیره موقت در حافظه سرور برای آپلود یکباره
                    with open(file_name, 'wb') as f:
                        for chunk in response.iter_content(chunk_size=8192):
                            f.write(chunk)
                    
                    # آپلود یکپارچه به درایو
                    file_metadata = {'name': file_name, 'parents': [folder_id]}
                    media = MediaFileUpload(file_name, mimetype='application/octet-stream', resumable=True)
                    drive_service.files().create(body=file_metadata, media_body=media).execute()
                    
                    print(f"Successfully moved {file_name}")
                    os.remove(file_name) # پاک کردن فایل موقت برای پر نشدن هارد سرور
                else:
                    print(f"Failed to download {file_name}, Status: {response.status_code}")
            except Exception as e:
                print(f"Error migrating {file_name}: {str(e)}")

        print("All files processed!")
        EOF
