name: Direct Upload Links to Google Drive

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google API Client
      run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

    - name: Run Direct Download and Upload
      env:
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
      run: |
        python - << 'EOF'
        import os
        import requests
        from googleapiclient.discovery import build
        from googleapiclient.http import MediaFileUpload
        from google.oauth2.credentials import Credentials

        # ۱. تنظیمات اولیه اتصال به درایو
        token = os.environ.get('GDRIVE_TOKEN')
        folder_id = os.environ.get('GDRIVE_FOLDER_ID')
        creds = Credentials(token=token)
        drive_service = build('drive', 'v3', credentials=creds)

        # ۲. لیست دقیق ۶۵ لینک شما
        urls = [
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z01",
