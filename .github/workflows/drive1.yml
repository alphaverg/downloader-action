            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z08",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z09",
            "https://github.com/alphaverg/downloader-action/raw/master/downloads/archive_20260524_190954_2/archive_20260524_190954.z10",
